name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-gates:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Project Config Integrity
        run: npm run check:project-config-integrity

      - name: Regression Fixture Matrix
        run: npm run check:fixture-matrix

      - name: Debug Commands Sanity
        run: npm run check:debug-commands-sanity

      - name: Fixture Validation
        run: npm run check:fixture-validation
